version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: axon_postgres
    environment:
      POSTGRES_DB: axon_db
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
